<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My Trips</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/stylesheet1.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Outdoor Adventure Planner</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="../index.html" tabindex="0">Home</a>
        <a class="nav-link" href="../content/mytrips.html" tabindex="0">My Trips</a>
        <a class="nav-link" href="../content/camping.html" tabindex="0">Camping</a>
        <a class="nav-link" href="../content/climbing.html" tabindex="0">Climbing</a>
        <a class="nav-link" href="../content/trails.html" tabindex="0">Trails</a>
        <a class="nav-link" href="../author/authors.html" tabindex="0">Authors</a>
        <a class="nav-link" href="../faq/faq.html" tabindex="0">FAQ</a>
        <a class="nav-link" href="../content/login.html" tabindex="0">| Login</a>
      </div>
    </div>
  </nav>
</header>

<section class="hero-section text-center" style="--hero-image: url('../assets/images/mytrips.jpg');">
  <div class="container">
    <div class="hero-box mx-auto col-lg-8 col-md-10">
      <h1 class="fw-light">My Trips</h1>
      <p class="lead text-body-secondary">
        This page displays each of your saved trips, click on a trip to view its content!
      </p>
    </div>
  </div>
</section>

<!-- Establish area for displaying user trips -->
<div class="container py-5">
  <div class="card p-4 mb-4">
    <h4>Add New Trip</h4>
    <input id="tripName" class="form-control mb-2" placeholder="Trip name">
    <input id="tripLocation" class="form-control mb-2" placeholder="Location">
    <!-- Button to add new trip -->
    <button onclick="addTrip()" class="btn btn-primary">Add Trip</button>
  </div>
  <!--Call trips-container to find all of the user's trips-->
  <div id="trips-container" class="row g-4"></div>
</div>

<!-- Modal for viewing/editing trip details -->
<div class="modal fade" id="tripModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title border-bottom pb-1" id="editModalTitle" contenteditable="true" style="cursor:text;">Trip Name</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Editable trip details with accordion for trails, climbs, and camping -->
      <div class="modal-body">
        <input id="editLocation" class="form-control mb-3" placeholder="Location">
        <div class="accordion" id="tripAccordion">

          <!-- Trails -->
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#trailsSection">
                Trails
              </button>
            </h2>
            <div id="trailsSection" class="accordion-collapse collapse show">
              <div class="accordion-body" id="trailsList"></div>
            </div>
          </div>

          <!-- Climbing -->
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#climbsSection">
                Climbing Routes
              </button>
            </h2>
            <div id="climbsSection" class="accordion-collapse collapse">
              <div class="accordion-body" id="climbsList"></div>
            </div>
          </div>

          <!-- Camping -->
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#campingSection">
                Camping Spots
              </button>
            </h2>
            <div id="campingSection" class="accordion-collapse collapse">
              <div class="accordion-body" id="campingList"></div>
            </div>
          </div>
        </div>
      </div>

      <!--Add buttons for altering the trip itself-->
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteTrip()">Remove Trip</button>
        <button class="btn btn-primary" onclick="saveTrip()">Save Changes</button>
      </div>

    </div>
  </div>
</div>

<!-- Modal for viewing item details -->
<div class="modal fade" id="viewItemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Item Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="viewItemContent"></div>

    </div>
  </div>
</div>

<footer class="text-body-secondary py-5">
  <div class="container">
    <p class="float-end mb-1"><a href="#">Back to top</a></p>
    <p class="mb-1">
      MS_6 &copy;
    </p>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="mytrips.js"></script>
</body>
</html>
